version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: hat-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hatuser
      POSTGRES_PASSWORD: hatstudio2024
      POSTGRES_DB: hat_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:16-alpine
    container_name: hat-studio-db-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: hat_studio_test
    ports:
      - "5433:5432"
    profiles:
      - test

volumes:
  postgres_data: